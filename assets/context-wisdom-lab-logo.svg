<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 260" role="img" aria-labelledby="title desc">
  <title id="title">ContextWisdomLab logo</title>
  <desc id="desc">An original logo for ContextWisdomLab, showing context layers rising from data to wisdom beside the Korean name 맥락과 지혜 연구실.</desc>
  <defs>
    <linearGradient id="wisdomLine" x1="80" y1="190" x2="220" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#287375"/>
      <stop offset="1" stop-color="#BE8F40"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#16263D" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect x="40" y="34" width="188" height="188" rx="38" fill="#F7F5F0" filter="url(#softShadow)"/>
  <path d="M82 176 C104 114 147 81 204 66" fill="none" stroke="url(#wisdomLine)" stroke-width="10" stroke-linecap="round"/>
  <circle cx="84" cy="178" r="15" fill="#16263D"/>
  <circle cx="122" cy="126" r="15" fill="#287375"/>
  <circle cx="163" cy="91" r="15" fill="#4F5968"/>
  <circle cx="204" cy="66" r="15" fill="#BE8F40"/>

  <path d="M73 74 H119 V120 H73 Z" fill="#D6DAD8"/>
  <path d="M101 112 H147 V158 H101 Z" fill="#D6DAD8" opacity="0.74"/>
  <path d="M133 145 H179 V191 H133 Z" fill="#D6DAD8" opacity="0.48"/>
  <path d="M76 201 H201" stroke="#16263D" stroke-width="6" stroke-linecap="round" opacity="0.86"/>

  <text x="270" y="103" fill="#16263D" font-family="Inter, Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="50" font-weight="750" letter-spacing="0">
    ContextWisdomLab
  </text>
  <text x="272" y="150" fill="#287375" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, Arial, sans-serif" font-size="28" font-weight="650" letter-spacing="0">
    맥락과 지혜 연구실
  </text>
  <text x="272" y="191" fill="#4F5968" font-family="Inter, Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="22" letter-spacing="0">
    Context into judgment. Judgment into action.
  </text>
</svg>
